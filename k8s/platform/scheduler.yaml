apiVersion: apps/v1
kind: Deployment
metadata:
  name: scheduler
  namespace: platform
  labels:
    app.kubernetes.io/name: scheduler
    app.kubernetes.io/part-of: msgctf-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: scheduler
  template:
    metadata:
      labels:
        app.kubernetes.io/name: scheduler
    spec:
      containers:
        - name: scheduler
          image: ghcr.io/msgctf/msgctf-scheduler:latest
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
