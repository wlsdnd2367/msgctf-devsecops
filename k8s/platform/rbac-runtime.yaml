apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: challenge-runtime
  namespace: challenge
rules:
  - apiGroups: ["", "apps"]
    resources: ["pods", "services", "deployments"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: challenge-runtime
  namespace: challenge
subjects:
  - kind: ServiceAccount
    name: runtime
    namespace: platform
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: challenge-runtime
