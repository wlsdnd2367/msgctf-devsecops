apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: platform
  labels:
    app.kubernetes.io/name: backend
    app.kubernetes.io/part-of: msgctf-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/msgctf/msgctf-backend:latest
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: platform
spec:
  selector:
    app.kubernetes.io/name: backend
  ports:
    - port: 80
      targetPort: 8080
