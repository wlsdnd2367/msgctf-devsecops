apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: platform
  labels:
    app.kubernetes.io/name: frontend
    app.kubernetes.io/part-of: msgctf-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/msgctf/msgctf-frontend:latest
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: platform
spec:
  selector:
    app.kubernetes.io/name: frontend
  ports:
    - port: 80
      targetPort: 80
