apiVersion: apps/v1
kind: Deployment
metadata:
  name: runtime
  namespace: platform
  labels:
    app.kubernetes.io/name: runtime
    app.kubernetes.io/part-of: msgctf-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: runtime
  template:
    metadata:
      labels:
        app.kubernetes.io/name: runtime
    spec:
      serviceAccountName: runtime
      containers:
        - name: runtime
          image: ghcr.io/msgctf/msgctf-runtime:latest
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: runtime
  namespace: platform
