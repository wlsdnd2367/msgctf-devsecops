name: Platform CI/CD

on:
  push:
    branches:
      - main
      - master
    paths:
      - frontend/**
      - backend/**
      - runtime/**
      - scheduler/**
      - k8s/**
      - .github/workflows/platform-cicd.yml
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  security-events: write
  id-token: write

env:
  REGISTRY: ghcr.io

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        component: [frontend, backend, runtime, scheduler]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run component tests
        run: |
          if [ -f "${{ matrix.component }}/Makefile" ]; then
            make -C "${{ matrix.component }}" test
          elif [ -f "${{ matrix.component }}/package.json" ]; then
            npm --prefix "${{ matrix.component }}" ci
            npm --prefix "${{ matrix.component }}" test
          elif [ -f "${{ matrix.component }}/requirements.txt" ]; then
            python -m pip install -r "${{ matrix.component }}/requirements.txt"
            python -m pytest "${{ matrix.component }}"
          else
            echo "No test target for ${{ matrix.component }} yet"
          fi

  build-scan-push:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        component: [frontend, backend, runtime, scheduler]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        run: |
          docker run --rm \
            -v "$PWD:/repo" \
            ghcr.io/gitleaks/gitleaks:latest \
            dir /repo --redact --verbose

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image for scan
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.component }}
          load: true
          tags: ${{ env.REGISTRY }}/${{ github.repository_owner }}/msgctf-${{ matrix.component }}:${{ github.sha }}

      - name: Run Trivy image scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ github.repository_owner }}/msgctf-${{ matrix.component }}:${{ github.sha }}
          format: sarif
          output: trivy-${{ matrix.component }}.sarif
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: "1"

      - name: Upload Trivy SARIF
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-${{ matrix.component }}.sarif

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.component }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/msgctf-${{ matrix.component }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/msgctf-${{ matrix.component }}:latest

  deploy-gke:
    needs: build-scan-push
    if: github.event_name != 'pull_request' && vars.ENABLE_GKE_DEPLOY == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ secrets.GKE_CLUSTER }}
          location: ${{ secrets.GKE_LOCATION }}

      - name: Deploy platform manifests
        run: |
          kubectl apply -f k8s/base/namespaces.yaml
          kubectl apply -f k8s/platform/
