name: Challenge Deployment

on:
  workflow_call:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  REGISTRY: ghcr.io

jobs:
  validate-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    outputs:
      challenge_id: ${{ steps.spec.outputs.challenge_id }}
      submitted_image: ${{ steps.spec.outputs.submitted_image }}
      submitted_pinned_image: ${{ steps.submitted-digest.outputs.submitted_pinned_image }}
      submitted_digest: ${{ steps.submitted-digest.outputs.submitted_digest }}
      container_port: ${{ steps.spec.outputs.container_port }}
      health_path: ${{ steps.spec.outputs.health_path }}

    steps:
      - name: Checkout metadata repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate challenge spec
        id: spec
        run: |
          python scripts/validate_challenge_spec.py challenge.toml \
            --json-output challenge-meta.json \
            --github-output "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Run Gitleaks on metadata repo
        run: |
          docker run --rm \
            -v "$PWD:/repo" \
            ghcr.io/gitleaks/gitleaks:latest \
            dir /repo --redact --verbose

      - name: Pull submitted image
        env:
          SUBMITTED_IMAGE: ${{ steps.spec.outputs.submitted_image }}
        run: |
          docker pull "$SUBMITTED_IMAGE"

      - name: Pin submitted image digest
        id: submitted-digest
        env:
          SUBMITTED_IMAGE: ${{ steps.spec.outputs.submitted_image }}
        run: |
          pinned="$(docker image inspect "$SUBMITTED_IMAGE" --format '{{index .RepoDigests 0}}')"
          digest="${pinned##*@}"
          echo "submitted_pinned_image=$pinned" >> "$GITHUB_OUTPUT"
          echo "submitted_digest=$digest" >> "$GITHUB_OUTPUT"

      - name: Gate Trivy vulnerability scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          version: v0.72.0
          image-ref: ${{ steps.submitted-digest.outputs.submitted_pinned_image }}
          format: table
          scanners: vuln
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: "1"

      - name: Write Trivy vulnerability SARIF
        if: always()
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          version: v0.72.0
          image-ref: ${{ steps.submitted-digest.outputs.submitted_pinned_image }}
          format: sarif
          output: trivy-vuln-results.sarif
          scanners: vuln
          ignore-unfixed: true
          exit-code: "0"

      - name: Gate Trivy image secret scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          version: v0.72.0
          image-ref: ${{ steps.submitted-digest.outputs.submitted_pinned_image }}
          format: table
          scanners: secret
          severity: HIGH,CRITICAL
          exit-code: "1"

      - name: Write Trivy secret SARIF
        if: always()
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          version: v0.72.0
          image-ref: ${{ steps.submitted-digest.outputs.submitted_pinned_image }}
          format: sarif
          output: trivy-secret-results.sarif
          scanners: secret
          exit-code: "0"

      - name: Upload Trivy vulnerability SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-vuln-results.sarif
          category: trivy-vulnerability

      - name: Upload Trivy secret SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-secret-results.sarif
          category: trivy-secret

      - name: Health check submitted image
        env:
          SUBMITTED_PINNED_IMAGE: ${{ steps.submitted-digest.outputs.submitted_pinned_image }}
          CONTAINER_PORT: ${{ steps.spec.outputs.container_port }}
          HEALTH_PATH: ${{ steps.spec.outputs.health_path }}
        run: |
          cap_args=(--cap-drop=ALL)
          if [ "$CONTAINER_PORT" -lt 1024 ]; then
            cap_args+=(--cap-add=NET_BIND_SERVICE)
          fi
          container_id="$(docker run -d \
            "${cap_args[@]}" \
            --security-opt=no-new-privileges \
            --pids-limit=256 \
            --cpus=1 \
            --memory=512m \
            --read-only \
            --tmpfs /tmp:rw,noexec,nosuid,size=64m \
            --tmpfs /var/cache/nginx:rw,noexec,nosuid,uid=101,gid=101,size=64m \
            --tmpfs /var/log/nginx:rw,noexec,nosuid,uid=101,gid=101,size=16m \
            --tmpfs /var/run:rw,noexec,nosuid,uid=101,gid=101,size=16m \
            -p "18080:${CONTAINER_PORT}" \
            "$SUBMITTED_PINNED_IMAGE")"
          trap 'docker rm -f "$container_id"' EXIT
          for i in $(seq 1 20); do
            if curl -fsS "http://127.0.0.1:18080${HEALTH_PATH}"; then
              exit 0
            fi
            sleep 2
          done
          docker logs "$container_id"
          exit 1

      - name: Upload scan artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.spec.outputs.challenge_id }}-scan-results
          path: |
            challenge-meta.json
            trivy-vuln-results.sarif
            trivy-secret-results.sarif

  promote:
    needs: validate-scan
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      promoted_image: ${{ steps.promoted-image.outputs.image }}
      digest: ${{ steps.digest.outputs.digest }}

    steps:
      - name: Checkout metadata repo
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set promoted image name
        id: promoted-image
        env:
          CHALLENGE_ID: ${{ needs.validate-scan.outputs.challenge_id }}
        run: |
          echo "image=${REGISTRY}/${GITHUB_REPOSITORY_OWNER}/${CHALLENGE_ID}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Promote image to MSGCTF GHCR
        env:
          SUBMITTED_PINNED_IMAGE: ${{ needs.validate-scan.outputs.submitted_pinned_image }}
          PROMOTED_IMAGE: ${{ steps.promoted-image.outputs.image }}
        run: |
          docker pull "$SUBMITTED_PINNED_IMAGE"
          docker tag "$SUBMITTED_PINNED_IMAGE" "${PROMOTED_IMAGE}:${GITHUB_SHA}"
          docker tag "$SUBMITTED_PINNED_IMAGE" "${PROMOTED_IMAGE}:latest"
          docker push "${PROMOTED_IMAGE}:${GITHUB_SHA}"
          docker push "${PROMOTED_IMAGE}:latest"

      - name: Extract promoted digest
        id: digest
        env:
          PROMOTED_IMAGE: ${{ steps.promoted-image.outputs.image }}
        run: |
          promoted_ref="${PROMOTED_IMAGE}:${GITHUB_SHA}"
          digest="$(docker buildx imagetools inspect "$promoted_ref" --format '{{json .Manifest.Digest}}' | tr -d '"')"
          echo "digest=$digest" >> "$GITHUB_OUTPUT"

      - name: Generate artifact
        env:
          SUBMITTED_IMAGE: ${{ needs.validate-scan.outputs.submitted_image }}
          SUBMITTED_DIGEST: ${{ needs.validate-scan.outputs.submitted_digest }}
          PROMOTED_IMAGE: ${{ steps.promoted-image.outputs.image }}
          PROMOTED_DIGEST: ${{ steps.digest.outputs.digest }}
        run: |
          python scripts/generate_artifact.py \
            --challenge-spec challenge.toml \
            --submitted-image "$SUBMITTED_IMAGE" \
            --submitted-digest "$SUBMITTED_DIGEST" \
            --image "$PROMOTED_IMAGE" \
            --digest "$PROMOTED_DIGEST" \
            --scan-result PASS \
            --output artifact.json

      - name: Render challenge manifest
        run: |
          python scripts/render_challenge_manifest.py \
            --artifact artifact.json \
            --profiles config/resource-profiles.json \
            --output dist/challenge-manifest.yaml

      - name: Upload deployment artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ needs.validate-scan.outputs.challenge_id }}-deployment
          path: |
            artifact.json
            dist/challenge-manifest.yaml
