name: Challenge Deployment

on:
  workflow_call:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  security-events: write

env:
  REGISTRY: ghcr.io

jobs:
  validate-scan-promote:
    runs-on: ubuntu-latest

    outputs:
      challenge_id: ${{ steps.spec.outputs.challenge_id }}
      submitted_image: ${{ steps.input-image.outputs.submitted_image }}
      promoted_image: ${{ steps.promoted-image.outputs.image }}
      digest: ${{ steps.digest.outputs.digest }}

    steps:
      - name: Checkout metadata repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate challenge spec
        id: spec
        run: |
          python scripts/validate_challenge_spec.py challenge.toml \
            --json-output challenge-meta.json \
            --github-output "$GITHUB_OUTPUT"

      - name: Resolve submitted image
        id: input-image
        run: |
          submitted="${{ steps.spec.outputs.submitted_image }}"
          echo "submitted_image=$submitted" >> "$GITHUB_OUTPUT"

      - name: Set promoted image name
        id: promoted-image
        run: |
          echo "image=${REGISTRY}/${GITHUB_REPOSITORY_OWNER}/${{ steps.spec.outputs.challenge_id }}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Run Gitleaks on metadata repo
        run: |
          docker run --rm \
            -v "$PWD:/repo" \
            ghcr.io/gitleaks/gitleaks:latest \
            dir /repo --redact --verbose

      - name: Pull submitted image
        run: |
          docker pull "${{ steps.input-image.outputs.submitted_image }}"
          
      - name: Debug Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ steps.input-image.outputs.submitted_image }}
          format: table
          scanners: vuln
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "0"
      - name: Run Trivy image scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          version: v0.72.0
          image-ref: ${{ steps.input-image.outputs.submitted_image }}
          format: sarif
          output: trivy-results.sarif
          scanners: vuln
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: "1"

      - name: Upload Trivy SARIF
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif

      - name: Health check submitted image
        run: |
          container_id="$(docker run -d -p 18080:${{ steps.spec.outputs.container_port }} "${{ steps.input-image.outputs.submitted_image }}")"
          trap 'docker rm -f "$container_id"' EXIT
          for i in $(seq 1 20); do
            if curl -fsS "http://127.0.0.1:18080${{ steps.spec.outputs.health_path }}"; then
              exit 0
            fi
            sleep 2
          done
          docker logs "$container_id"
          exit 1

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Promote image to MSGCTF GHCR
        if: github.event_name != 'pull_request'
        run: |
          docker tag "${{ steps.input-image.outputs.submitted_image }}" "${{ steps.promoted-image.outputs.image }}:${{ github.sha }}"
          docker tag "${{ steps.input-image.outputs.submitted_image }}" "${{ steps.promoted-image.outputs.image }}:latest"
          docker push "${{ steps.promoted-image.outputs.image }}:${{ github.sha }}"
          docker push "${{ steps.promoted-image.outputs.image }}:latest"

      - name: Extract promoted digest
        id: digest
        if: github.event_name != 'pull_request'
        run: |
          promoted_ref="${{ steps.promoted-image.outputs.image }}:${{ github.sha }}"
          digest="$(docker buildx imagetools inspect "$promoted_ref" --format '{{json .Manifest.Digest}}' | tr -d '"')"
          echo "digest=$digest" >> "$GITHUB_OUTPUT"

      - name: Generate artifact
        if: github.event_name != 'pull_request'
        run: |
          python scripts/generate_artifact.py \
            --challenge-spec challenge.toml \
            --submitted-image "${{ steps.input-image.outputs.submitted_image }}" \
            --image "${{ steps.promoted-image.outputs.image }}" \
            --digest "${{ steps.digest.outputs.digest }}" \
            --scan-result PASS \
            --output artifact.json

      - name: Render challenge manifest
        if: github.event_name != 'pull_request'
        run: |
          python scripts/render_challenge_manifest.py \
            --artifact artifact.json \
            --profiles config/resource-profiles.json \
            --output dist/challenge-manifest.yaml

      - name: Upload deployment artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.spec.outputs.challenge_id }}-deployment
          path: |
            artifact.json
            challenge-meta.json
            dist/challenge-manifest.yaml
            trivy-results.sarif
